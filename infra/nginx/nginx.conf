events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 20M;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=web:10m rate=60r/s;

  # Gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  # Redirect HTTP to HTTPS
  server {
    listen 80;
    server_name emas.my www.emas.my api.emas.my;
    return 301 https://$host$request_uri;
  }

  # Web app (emas.my)
  server {
    listen 443 ssl;
    server_name emas.my www.emas.my;

    ssl_certificate /etc/letsencrypt/live/emas.my/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/emas.my/privkey.pem;

    limit_req zone=web burst=20 nodelay;

    location / {
      proxy_pass http://web:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # API (api.emas.my)
  server {
    listen 443 ssl;
    server_name api.emas.my;

    ssl_certificate /etc/letsencrypt/live/emas.my/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/emas.my/privkey.pem;

    limit_req zone=api burst=50 nodelay;

    location / {
      proxy_pass http://api:3001;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
