<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Outer rounded square -->
  <rect width="200" height="200" rx="32" ry="32" fill="white"/>
  <rect x="4" y="4" width="192" height="192" rx="28" ry="28" fill="white" stroke="#d4a017" stroke-width="6"/>

  <!-- Top-left: E -->
  <rect x="12" y="12" width="85" height="85" rx="16" ry="16" fill="url(#gold1)"/>
  <!-- Top-right: M -->
  <rect x="103" y="12" width="85" height="85" rx="16" ry="16" fill="url(#gold2)"/>
  <!-- Bottom-left: A -->
  <rect x="12" y="103" width="85" height="85" rx="16" ry="16" fill="url(#gold3)"/>
  <!-- Bottom-right: S -->
  <rect x="103" y="103" width="85" height="85" rx="16" ry="16" fill="url(#gold4)"/>

  <defs>
    <linearGradient id="gold1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0b429"/>
      <stop offset="100%" stop-color="#c8860a"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0b429"/>
      <stop offset="100%" stop-color="#c8860a"/>
    </linearGradient>
    <linearGradient id="gold3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0b429"/>
      <stop offset="100%" stop-color="#c8860a"/>
    </linearGradient>
    <linearGradient id="gold4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0b429"/>
      <stop offset="100%" stop-color="#c8860a"/>
    </linearGradient>
  </defs>

  <!-- Letters -->
  <text x="54" y="71" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="52" fill="white" text-anchor="middle">E</text>
  <text x="146" y="71" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="52" fill="white" text-anchor="middle">M</text>
  <text x="54" y="162" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="52" fill="white" text-anchor="middle">A</text>
  <text x="146" y="162" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="52" fill="white" text-anchor="middle">S</text>
</svg>
